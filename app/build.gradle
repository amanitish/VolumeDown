plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    namespace 'com.example.volumelogger'
    compileSdk 34
    defaultConfig {
        applicationId "com.example.volumelogger"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
}
